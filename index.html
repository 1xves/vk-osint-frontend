<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Ecosystem Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg:             #0b0e1a;
  --surface:        #131726;
  --elevated:       #1a2032;
  --hover:          #202840;
  --border:         rgba(255,255,255,0.07);
  --border-accent:  rgba(201,169,110,0.3);
  --text:           #ddd8cf;
  --text-secondary: #c2bcb2;
  --muted:          #737a99;
  --faint:          #323a5a;
  --gold:           #c9a96e;
  --gold-glow:      rgba(201,169,110,0.12);
  --teal:           #4cc9b8;
  --red:            #e05555;
  --blue:           #5b8ee6;
  --purple:         #9b72cf;
  --green:          #5bc97a;
  --amber:          #e0a850;
  --sidebar-w:      252px;
  --radius:         8px;
  --transition:     160ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ─── Layout ─────────────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ─── Sidebar ────────────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-brand {
  padding: 24px 20px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-wordmark {
  font-family: 'Cormorant', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.06em;
}
.brand-sub {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 400;
}

.sidebar-label {
  padding: 16px 20px 8px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--faint);
  font-weight: 500;
  flex-shrink: 0;
}

.city-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 12px;
  min-height: 0;
}

.city-item {
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background var(--transition);
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.city-item:hover { background: var(--hover); }
.city-item.active {
  background: var(--gold-glow);
  border-color: var(--border-accent);
}
.city-confidence-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.city-confidence-dot.high   { background: var(--teal); }
.city-confidence-dot.medium { background: var(--gold); }
.city-confidence-dot.low    { background: var(--muted); }
.city-confidence-dot.none   { background: var(--faint); }

.city-item-name {
  font-size: 13.5px;
  font-weight: 500;
  flex: 1;
  color: var(--text);
}
.city-item.active .city-item-name { color: var(--gold); }
.city-item-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
}

/* Sidebar nav (shown after city selected) */
.sidebar-nav {
  padding: 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-item {
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 400;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item.active {
  background: var(--gold-glow);
  color: var(--gold);
  border-color: var(--border-accent);
  font-weight: 500;
}
.nav-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }

/* ─── Main ───────────────────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ─── City Header ─────────────────────────────────────────────────────────── */
#city-header {
  padding: 22px 40px 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.city-title {
  font-family: 'Cormorant', serif;
  font-size: 2.6rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--text);
}
.city-meta-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 7px;
}
.city-meta-item {
  font-size: 12px;
  color: var(--muted);
}
.city-meta-sep { color: var(--faint); font-size: 10px; }
.confidence-pill {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 500;
}
.confidence-pill.high   { background: rgba(76,201,184,0.12); color: var(--teal); border: 1px solid rgba(76,201,184,0.25); }
.confidence-pill.medium { background: var(--gold-glow); color: var(--gold); border: 1px solid var(--border-accent); }
.confidence-pill.low    { background: rgba(115,122,153,0.1); color: var(--muted); border: 1px solid var(--border); }

/* View tabs */
.view-tabs {
  display: flex;
  margin-top: 18px;
  gap: 0;
}
.view-tab {
  padding: 8px 20px;
  font-size: 13px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  font-weight: 400;
  white-space: nowrap;
}
.view-tab:hover { color: var(--text); }
.view-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
  font-weight: 500;
}

/* ─── Content ─────────────────────────────────────────────────────────────── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
  min-height: 0;
}

/* ─── State containers ────────────────────────────────────────────────────── */
.state-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
  text-align: center;
}
.state-glyph {
  font-family: 'Cormorant', serif;
  font-size: 5rem;
  color: var(--faint);
  line-height: 1;
}
.state-title {
  font-family: 'Cormorant', serif;
  font-size: 1.5rem;
  color: var(--muted);
  font-weight: 500;
}
.state-sub { font-size: 12.5px; color: var(--faint); max-width: 300px; }

.spinner {
  width: 22px;
  height: 22px;
  border: 2px solid var(--faint);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Section header ──────────────────────────────────────────────────────── */
.section-heading {
  font-family: 'Cormorant', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-heading::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── Overview ────────────────────────────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: border-color var(--transition);
}
.stat-card:hover { border-color: var(--border-accent); }
.stat-label {
  font-size: 10.5px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.2rem;
  line-height: 1.1;
  margin-top: 8px;
  font-weight: 500;
  color: var(--text);
}
.stat-card.accent .stat-value { color: var(--gold); }

.overview-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 28px;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}

/* Type breakdown */
.type-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.type-row:last-child { border-bottom: none; }
.type-swatch {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.type-label { flex: 1; font-size: 12.5px; color: var(--text-secondary); }
.type-track {
  width: 72px;
  height: 3px;
  background: var(--elevated);
  border-radius: 2px;
  overflow: hidden;
}
.type-fill { height: 100%; border-radius: 2px; }
.type-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 24px;
  text-align: right;
}

/* Signals */
.signal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.signal-tile {
  padding: 14px;
  background: var(--elevated);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.signal-n {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.7rem;
  font-weight: 500;
  line-height: 1;
}
.signal-desc { font-size: 11px; color: var(--muted); margin-top: 5px; }
.signal-tile.partner   .signal-n { color: var(--teal); }
.signal-tile.blocker   .signal-n { color: var(--red); }
.signal-tile.investment .signal-n { color: var(--blue); }
.signal-tile.competitor .signal-n { color: var(--purple); }

/* Top influencer list */
.influencer-list { display: flex; flex-direction: column; gap: 7px; }
.inf-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
}
.inf-row:hover { border-color: var(--border-accent); background: var(--elevated); }
.inf-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--faint);
  min-width: 18px;
}
.inf-name { flex: 1; font-weight: 500; font-size: 13.5px; }
.inf-type { font-size: 11px; color: var(--muted); }
.inf-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--gold);
  padding: 2px 8px;
  background: var(--gold-glow);
  border-radius: 4px;
}

/* ─── Briefing ────────────────────────────────────────────────────────────── */
.briefing-doc { max-width: 740px; }
.briefing-section {
  margin-bottom: 44px;
  padding-bottom: 44px;
  border-bottom: 1px solid var(--border);
}
.briefing-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.briefing-sec-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--gold);
  letter-spacing: 0.12em;
  margin-bottom: 7px;
}
.briefing-sec-title {
  font-family: 'Cormorant', serif;
  font-size: 1.65rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 18px;
}
.briefing-body {
  font-size: 14.5px;
  line-height: 1.78;
  color: var(--text-secondary);
}
.briefing-body p { margin-bottom: 14px; }
.briefing-body p:last-child { margin-bottom: 0; }
.briefing-sub-title {
  font-family: 'Cormorant', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  margin: 22px 0 8px;
}

/* ─── Key Players ─────────────────────────────────────────────────────────── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-items: center;
  margin-bottom: 22px;
}
.filter-chip {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--border-accent); color: var(--text); }
.filter-chip.on {
  background: var(--gold-glow);
  border-color: var(--border-accent);
  color: var(--gold);
  font-weight: 500;
}
.filter-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 3px;
  flex-shrink: 0;
}

.results-count {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}

.player-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 13px;
  margin-bottom: 20px;
}
.player-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: border-color var(--transition), background var(--transition);
  cursor: pointer;
}
.player-card:hover { border-color: var(--border-accent); background: var(--elevated); }
.player-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 9px;
}
.player-name {
  font-weight: 500;
  font-size: 14.5px;
  line-height: 1.3;
  flex: 1;
}
.player-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--gold);
  flex-shrink: 0;
  padding: 3px 9px;
  background: var(--gold-glow);
  border-radius: 5px;
}
.player-type {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 500;
  margin-bottom: 9px;
}
.player-desc {
  font-size: 12.5px;
  color: var(--muted);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.player-flags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.pflag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: 500;
  letter-spacing: 0.04em;
}
.pflag.partner    { background: rgba(76,201,184,0.1);  color: var(--teal);   }
.pflag.blocker    { background: rgba(224,85,85,0.1);   color: var(--red);    }
.pflag.influencer { background: var(--gold-glow);      color: var(--gold);   }
.pflag.investment { background: rgba(91,142,230,0.1);  color: var(--blue);   }
.pflag.competitor { background: rgba(155,114,207,0.1); color: var(--purple); }
.pflag.recruiter  { background: rgba(91,201,122,0.1);  color: var(--green);  }
.pflag.support    { background: rgba(115,122,153,0.1); color: var(--muted);  }

.load-more {
  width: 100%;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  transition: all var(--transition);
}
.load-more:hover { border-color: var(--border-accent); color: var(--gold); }

/* ─── Network ─────────────────────────────────────────────────────────────── */
#network-wrap {
  width: 100%;
  height: calc(100vh - 220px);
  min-height: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}

.net-legend {
  position: absolute;
  top: 14px;
  left: 14px;
  background: rgba(11,14,26,0.88);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  backdrop-filter: blur(10px);
  z-index: 10;
}
.net-legend-title {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 9px;
  font-weight: 500;
}
.net-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2.5px 0;
  font-size: 11.5px;
  color: var(--text-secondary);
}
.net-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.net-hint {
  position: absolute;
  bottom: 14px;
  right: 14px;
  font-size: 10.5px;
  color: var(--faint);
  background: rgba(11,14,26,0.8);
  padding: 6px 12px;
  border-radius: 20px;
  backdrop-filter: blur(6px);
  z-index: 10;
}

.net-tooltip {
  position: absolute;
  background: rgba(11,14,26,0.94);
  border: 1px solid var(--border-accent);
  border-radius: var(--radius);
  padding: 10px 14px;
  pointer-events: none;
  z-index: 20;
  backdrop-filter: blur(10px);
  display: none;
  max-width: 200px;
}
.tt-name  { font-weight: 500; font-size: 13px; margin-bottom: 3px; }
.tt-type  { font-size: 11px; color: var(--muted); }
.tt-conns { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--gold); margin-top: 4px; }

/* ─── Animations ──────────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.28s ease forwards; }

/* ─── Error / Empty ───────────────────────────────────────────────────────── */
.empty-view {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 260px;
  color: var(--faint);
  font-family: 'Cormorant', serif;
  font-size: 1.15rem;
  font-style: italic;
}
</style>
</head>
<body>
<div id="app">

  <!-- ─── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-wordmark">Nexus</div>
      <div class="brand-sub">Ecosystem Intelligence</div>
    </div>

    <div class="sidebar-label">Cities</div>

    <div class="city-list" id="city-list">
      <div style="padding:12px;color:var(--faint);font-size:12px;">Loading…</div>
    </div>

    <div class="sidebar-nav" id="sidebar-nav" style="display:none">
      <div class="nav-item active" data-view="overview">
        <span class="nav-icon">◎</span>Overview
      </div>
      <div class="nav-item" data-view="briefing">
        <span class="nav-icon">≡</span>Intelligence Report
      </div>
      <div class="nav-item" data-view="players">
        <span class="nav-icon">◈</span>Key Players
      </div>
      <div class="nav-item" data-view="network">
        <span class="nav-icon">⬡</span>Network Map
      </div>
    </div>
  </aside>

  <!-- ─── Main ────────────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- City header -->
    <div id="city-header" style="display:none">
      <div class="city-title" id="city-title"></div>
      <div class="city-meta-row">
        <span class="city-meta-item" id="city-region"></span>
        <span class="city-meta-sep" id="city-sep" style="display:none">·</span>
        <span class="city-meta-item" id="city-date"></span>
        <span class="confidence-pill" id="city-conf"></span>
      </div>
      <div class="view-tabs" id="view-tabs">
        <div class="view-tab active" data-view="overview">Overview</div>
        <div class="view-tab" data-view="briefing">Intelligence Report</div>
        <div class="view-tab" data-view="players">Key Players</div>
        <div class="view-tab" data-view="network">Network Map</div>
      </div>
    </div>

    <!-- Content area -->
    <div id="content">
      <div id="v-landing" class="state-center">
        <div class="state-glyph">◈</div>
        <div class="state-title">Select an ecosystem</div>
        <div class="state-sub">Choose a city from the left to view its intelligence report.</div>
      </div>
      <div id="v-loading" class="state-center" style="display:none">
        <div class="spinner"></div>
        <div style="color:var(--muted);font-size:13px;margin-top:4px;">Loading intelligence…</div>
      </div>
      <div id="v-overview"  style="display:none"></div>
      <div id="v-briefing"  style="display:none"></div>
      <div id="v-players"   style="display:none"></div>
      <div id="v-network"   style="display:none"></div>
    </div>

  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const CFG = {
  key:  'ROTATE_BEFORE_DEPLOY',
  base: 'https://api.vk-osint.com',
};

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  cities:  [],
  city:    null,    // current city_key
  view:    'overview',
  cache:   {},
  players: { offset: 0, limit: 20, total: 0, type: null, flag: null, items: [] },
};

// ─── Label maps ───────────────────────────────────────────────────────────────
const TYPE_LABEL = {
  investor:         'Investor',
  philanthropic:    'Philanthropic Funder',
  corporate:        'Corporation',
  political:        'Political Figure',
  nonprofit:        'Nonprofit / NGO',
  executive_hnw:    'Business Leader',
  community_leader: 'Community Leader',
  politician:       'Politician',
  hnwi:             'High-Net-Worth Individual',
  illicit:          'Risk Actor',
};

const TYPE_COLOR = {
  investor:         '#c9a96e',
  philanthropic:    '#9b72cf',
  corporate:        '#5b8ee6',
  political:        '#e07a50',
  nonprofit:        '#4cc9b8',
  executive_hnw:    '#e0a850',
  community_leader: '#5bc97a',
  politician:       '#e05555',
  hnwi:             '#cfb870',
  illicit:          '#ff3d3d',
};

const FLAG_META = {
  partner_candidate:    { label: 'Partner',      cls: 'partner'    },
  blocker_candidate:    { label: 'Blocker',       cls: 'blocker'    },
  top_influencer:       { label: 'Top Influencer',cls: 'influencer' },
  investment_candidate: { label: 'Investment',    cls: 'investment' },
  competitor_candidate: { label: 'Competitor',    cls: 'competitor' },
  recruiter_candidate:  { label: 'Recruit Target',cls: 'recruiter'  },
  support_candidate:    { label: 'Support',       cls: 'support'    },
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(path, params = {}) {
  const url = new URL(CFG.base + path);
  Object.entries(params).forEach(([k, v]) => v != null && url.searchParams.set(k, String(v)));
  const r = await fetch(url.toString(), { headers: { 'X-API-Key': CFG.key, Accept: 'application/json' } });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} (${path})`);
  return r.json();
}

async function cached(key, fn) {
  if (!S.cache[key]) S.cache[key] = fn();
  return S.cache[key];
}

// ─── Startup ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const d = await api('/cities');
    S.cities = d.cities || [];
    renderCityList();
  } catch (e) {
    el('city-list').innerHTML = `<div style="padding:12px;color:var(--red);font-size:12px">Failed to connect: ${esc(e.message)}</div>`;
  }
}

// ─── City list ────────────────────────────────────────────────────────────────
function renderCityList() {
  const c = el('city-list');
  if (!S.cities.length) {
    c.innerHTML = '<div style="padding:12px;color:var(--faint);font-size:12px;font-style:italic">No cities available</div>';
    return;
  }
  c.innerHTML = S.cities.map(city => {
    const conf = city.overall_confidence || 'none';
    const active = S.city === city.city_key ? ' active' : '';
    return `
      <div class="city-item${active}" onclick="selectCity('${city.city_key}')" data-ck="${city.city_key}">
        <div class="city-confidence-dot ${conf}"></div>
        <div class="city-item-name">${esc(city.city_name)}</div>
        <div class="city-item-count">${fmt(city.entity_count)}</div>
      </div>`;
  }).join('');
}

// ─── Select city ──────────────────────────────────────────────────────────────
async function selectCity(ck) {
  if (S.city === ck) return;
  S.city = ck;
  S.view = 'overview';
  S.players = { offset: 0, limit: 20, total: 0, type: null, flag: null, items: [] };

  // Sidebar active state
  document.querySelectorAll('.city-item').forEach(n =>
    n.classList.toggle('active', n.dataset.ck === ck)
  );

  // Show nav + header
  el('sidebar-nav').style.display = '';
  el('city-header').style.display = '';
  setNav('overview');

  // Temp city name from list while loading
  const cityRec = S.cities.find(c => c.city_key === ck);
  if (cityRec) {
    el('city-title').textContent = cityRec.city_name;
    el('city-region').textContent = cityRec.country_or_region || '';
    el('city-date').textContent = '';
    el('city-sep').style.display = 'none';
    el('city-conf').textContent = '';
    el('city-conf').className = 'confidence-pill';
  }

  await loadView('overview');
}

// ─── View management ──────────────────────────────────────────────────────────
function setNav(view) {
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.view === view)
  );
  document.querySelectorAll('.view-tab').forEach(n =>
    n.classList.toggle('active', n.dataset.view === view)
  );
}

function showOnly(view) {
  ['landing','loading','overview','briefing','players','network'].forEach(v =>
    el('v-' + v).style.display = (v === view) ? '' : 'none'
  );
}

async function loadView(view) {
  S.view = view;
  setNav(view);
  switch (view) {
    case 'overview': return renderOverview();
    case 'briefing': return renderBriefing();
    case 'players':  return renderPlayers(true);
    case 'network':  return renderNetwork();
  }
}

// ─── Overview ─────────────────────────────────────────────────────────────────
async function renderOverview() {
  showOnly('loading');
  try {
    const ck = S.city;
    const [ov, topData] = await Promise.all([
      cached('ov:' + ck, () => api('/cities/' + ck)),
      cached('top:' + ck, () => api('/cities/' + ck + '/entities', { flag: 'top_influencer', limit: 10 })),
    ]);

    updateHeader(ov);

    const byType = ov.entity_counts?.by_type ?? {};
    const total  = ov.entity_counts?.total ?? 0;
    const maxN   = Math.max(...Object.values(byType), 1);

    el('v-overview').innerHTML = `
      <div class="fade-up">
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Actors Mapped</div>
            <div class="stat-value">${fmt(total)}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Relationships Mapped</div>
            <div class="stat-value">${fmt(ov.relationship_count ?? 0)}</div>
          </div>
          <div class="stat-card accent">
            <div class="stat-label">Top Influencers</div>
            <div class="stat-value">${fmt(ov.top_influencers ?? 0)}</div>
          </div>
        </div>

        <div class="overview-cols">
          <div>
            <div class="section-heading">Ecosystem Breakdown</div>
            <div class="panel">
              ${Object.entries(byType).sort((a,b) => b[1]-a[1]).map(([type, n]) => `
                <div class="type-row">
                  <div class="type-swatch" style="background:${TYPE_COLOR[type]||'#737a99'}"></div>
                  <div class="type-label">${TYPE_LABEL[type]||type}</div>
                  <div class="type-track">
                    <div class="type-fill" style="width:${Math.round(n/maxN*100)}%;background:${TYPE_COLOR[type]||'#737a99'}"></div>
                  </div>
                  <div class="type-n">${n}</div>
                </div>`).join('') || '<div style="color:var(--faint);font-size:12px;padding:8px 0">No data</div>'}
            </div>
          </div>

          <div>
            <div class="section-heading">Action Signals</div>
            <div class="panel">
              <div class="signal-grid">
                <div class="signal-tile partner">
                  <div class="signal-n">${ov.partner_candidates ?? 0}</div>
                  <div class="signal-desc">Partner Candidates</div>
                </div>
                <div class="signal-tile blocker">
                  <div class="signal-n">${ov.blocker_candidates ?? 0}</div>
                  <div class="signal-desc">Potential Blockers</div>
                </div>
                <div class="signal-tile investment">
                  <div class="signal-n">${ov.investment_candidates ?? 0}</div>
                  <div class="signal-desc">Investment Targets</div>
                </div>
                <div class="signal-tile competitor">
                  <div class="signal-n">${ov.competitor_candidates ?? 0}</div>
                  <div class="signal-desc">Competitors</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="section-heading">Top Influencers</div>
        <div class="influencer-list">
          ${(topData.entities || []).map((e, i) => `
            <div class="inf-row">
              <div class="inf-rank">${String(i+1).padStart(2,'0')}</div>
              <div class="inf-name">${esc(e.canonical_name)}</div>
              <div class="inf-type">${TYPE_LABEL[e.entity_type]||e.entity_type}</div>
              ${e.score_influence != null ? `<div class="inf-score">${e.score_influence}</div>` : ''}
            </div>`).join('') || '<div class="empty-view">No influencer data available.</div>'}
        </div>
      </div>`;

    showOnly('overview');
  } catch(e) { viewError('overview', e); }
}

// ─── Briefing ─────────────────────────────────────────────────────────────────
async function renderBriefing() {
  showOnly('loading');
  try {
    const ck = S.city;
    const briefing = await cached('brief:' + ck, () => api('/cities/' + ck + '/briefing', { format: 'json' }));
    const sections = briefing.sections || flattenBriefing(briefing);

    el('v-briefing').innerHTML = `
      <div class="briefing-doc fade-up">
        ${!sections.length
          ? '<div class="empty-view">Intelligence report not yet available.</div>'
          : sections.map((s, i) => `
            <div class="briefing-section">
              <div class="briefing-sec-num">Section ${String(i+1).padStart(2,'0')}</div>
              <div class="briefing-sec-title">${esc(s.title || 'Untitled')}</div>
              <div class="briefing-body">${renderBriefingBody(s)}</div>
            </div>`).join('')}
      </div>`;

    showOnly('briefing');
  } catch(e) { viewError('briefing', e); }
}

function flattenBriefing(obj) {
  if (!obj || typeof obj !== 'object') return [];
  const skip = new Set(['city_name','city_key','run_id','generated_at','model_used','timestamp','version']);
  return Object.entries(obj)
    .filter(([k]) => !skip.has(k))
    .map(([k, v]) => ({
      title:   k.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()),
      content: typeof v === 'string' ? v : JSON.stringify(v, null, 2),
    }));
}

function renderBriefingBody(sec) {
  if (sec.subsections?.length) {
    const intro = sec.content ? sec.content.split(/\n\n+/).map(p => `<p>${esc(p.trim())}</p>`).join('') : '';
    return intro + sec.subsections.map(sub => `
      <div class="briefing-sub-title">${esc(sub.title||'')}</div>
      ${(sub.content||'').split(/\n\n+/).map(p=>`<p>${esc(p.trim())}</p>`).join('')}
    `).join('');
  }
  const text = typeof sec.content === 'string' ? sec.content : JSON.stringify(sec.content||'', null, 2);
  return text.split(/\n\n+/).filter(p=>p.trim()).map(p => `<p>${esc(p.trim())}</p>`).join('');
}

// ─── Key Players ──────────────────────────────────────────────────────────────
async function renderPlayers(reset = false) {
  if (reset) S.players = { offset:0, limit:20, total:0, type: S.players.type, flag: S.players.flag, items:[] };
  showOnly('loading');
  try {
    await fetchPlayers();
    buildPlayersView();
  } catch(e) { viewError('players', e); }
}

async function fetchPlayers() {
  const { type, flag, offset, limit } = S.players;
  const d = await api('/cities/' + S.city + '/entities', { entity_type: type, flag, offset, limit });
  S.players.items.push(...(d.entities || []));
  S.players.total  = d.total ?? 0;
  S.players.offset = offset + (d.entities || []).length;
}

function buildPlayersView() {
  const { items, total, offset, type, flag } = S.players;

  const typeChips = [
    { k: null, label: 'All' },
    { k: 'investor',         label: 'Investors' },
    { k: 'philanthropic',    label: 'Philanthropic' },
    { k: 'corporate',        label: 'Corporations' },
    { k: 'political',        label: 'Government' },
    { k: 'politician',       label: 'Politicians' },
    { k: 'nonprofit',        label: 'Nonprofits' },
    { k: 'executive_hnw',    label: 'Business Leaders' },
    { k: 'hnwi',             label: 'HNWIs' },
    { k: 'community_leader', label: 'Community' },
    { k: 'illicit',          label: 'Risk Actors' },
  ];

  const flagChips = [
    { k: null,                  label: 'All Signals' },
    { k: 'partner_candidate',   label: 'Partners' },
    { k: 'blocker_candidate',   label: 'Blockers' },
    { k: 'top_influencer',      label: 'Top Influencers' },
    { k: 'investment_candidate',label: 'Investment Targets' },
    { k: 'competitor_candidate',label: 'Competitors' },
  ];

  el('v-players').innerHTML = `
    <div class="fade-up">
      <div class="filter-bar">
        ${typeChips.map(c => `
          <div class="filter-chip${type===c.k?' on':''}" onclick="setTypeFilter(${c.k?`'${c.k}'`:'null'})">
            ${c.label}
          </div>`).join('')}
        <div class="filter-sep"></div>
        ${flagChips.map(c => `
          <div class="filter-chip${flag===c.k?' on':''}" onclick="setFlagFilter(${c.k?`'${c.k}'`:'null'})">
            ${c.label}
          </div>`).join('')}
      </div>

      <div class="results-count">${fmt(total)} ${total===1?'result':'results'}</div>

      <div class="player-grid" id="pgrid">
        ${items.map(playerCard).join('')}
      </div>

      ${offset < total ? `
        <button class="load-more" onclick="loadMorePlayers()">
          Load more &mdash; ${fmt(total - offset)} remaining
        </button>` : ''}
    </div>`;

  showOnly('players');
}

function playerCard(e) {
  const col = TYPE_COLOR[e.entity_type] || '#737a99';
  const flags = Object.entries(FLAG_META)
    .filter(([k]) => e[k])
    .map(([, m]) => `<span class="pflag ${m.cls}">${m.label}</span>`)
    .join('');
  return `
    <div class="player-card">
      <div class="player-card-top">
        <div class="player-name">${esc(e.canonical_name)}</div>
        ${e.score_influence!=null ? `<div class="player-score">${e.score_influence}</div>` : ''}
      </div>
      <div class="player-type" style="background:${col}1a;color:${col}">
        ${TYPE_LABEL[e.entity_type]||e.entity_type}
      </div>
      ${e.description
        ? `<div class="player-desc">${esc(e.description)}</div>`
        : `<div class="player-desc" style="font-style:italic;color:var(--faint)">No profile available</div>`}
      ${flags ? `<div class="player-flags">${flags}</div>` : ''}
    </div>`;
}

async function setTypeFilter(type) {
  S.players.type   = type;
  S.players.offset = 0;
  S.players.items  = [];
  showOnly('loading');
  try { await fetchPlayers(); buildPlayersView(); }
  catch(e) { viewError('players', e); }
}

async function setFlagFilter(flag) {
  S.players.flag   = flag;
  S.players.offset = 0;
  S.players.items  = [];
  showOnly('loading');
  try { await fetchPlayers(); buildPlayersView(); }
  catch(e) { viewError('players', e); }
}

async function loadMorePlayers() {
  try { await fetchPlayers(); buildPlayersView(); }
  catch(e) { viewError('players', e); }
}

// ─── Network Map ──────────────────────────────────────────────────────────────
async function renderNetwork() {
  showOnly('loading');
  try {
    const ck = S.city;
    const d  = await cached('rels:' + ck, () => api('/cities/' + ck + '/relationships'));
    const edges = d.relationships || [];

    const legendItems = Object.entries(TYPE_LABEL)
      .filter(([k]) => TYPE_COLOR[k])
      .map(([k, label]) => `
        <div class="net-legend-item">
          <div class="net-legend-dot" style="background:${TYPE_COLOR[k]}"></div>
          ${label}
        </div>`).join('');

    el('v-network').innerHTML = `
      <div class="fade-up">
        <div id="network-wrap">
          <div class="net-legend">
            <div class="net-legend-title">Entity Type</div>
            ${legendItems}
          </div>
          <div class="net-hint">Drag to reposition · Scroll to zoom</div>
          <div class="net-tooltip" id="net-tt">
            <div class="tt-name"  id="tt-name"></div>
            <div class="tt-type"  id="tt-type"></div>
            <div class="tt-conns" id="tt-conns"></div>
          </div>
          <svg id="net-svg" style="width:100%;height:100%"></svg>
        </div>
      </div>`;

    showOnly('network');

    if (!edges.length) {
      document.getElementById('network-wrap').innerHTML =
        '<div class="empty-view">No relationship data available.</div>';
      return;
    }

    buildGraph(edges);
  } catch(e) { viewError('network', e); }
}

function buildGraph(edges) {
  const wrap = document.getElementById('network-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  // Build node index from edge endpoints
  const nodeMap = new Map();
  const addNode = (id, name, type) => {
    if (!nodeMap.has(id)) nodeMap.set(id, { id, name, type, deg: 0 });
    nodeMap.get(id).deg++;
  };
  edges.forEach(e => {
    addNode(e.source_entity_id, e.source_name, e.source_type);
    addNode(e.target_entity_id, e.target_name, e.target_type);
  });

  // Limit to top 120 nodes by degree for readability
  const nodes = [...nodeMap.values()].sort((a,b) => b.deg - a.deg).slice(0, 120);
  const topIds = new Set(nodes.map(n => n.id));

  const links = edges
    .filter(e => topIds.has(e.source_entity_id) && topIds.has(e.target_entity_id))
    .slice(0, 350)
    .map(e => ({
      source: e.source_entity_id,
      target: e.target_entity_id,
      strength: parseFloat(e.relationship_strength) || 0.4,
    }));

  const maxDeg = Math.max(...nodes.map(n => n.deg), 1);
  const r = d => 4 + (d.deg / maxDeg) * 13;

  const svg = d3.select('#net-svg').attr('viewBox', [0, 0, W, H]);
  const g   = svg.append('g');

  svg.call(
    d3.zoom().scaleExtent([0.15, 5])
      .on('zoom', ev => g.attr('transform', ev.transform))
  );

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d => d.id).distance(65).strength(0.35))
    .force('charge',  d3.forceManyBody().strength(-90).distanceMax(220))
    .force('center',  d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide(d => r(d) + 5));

  const line = g.append('g')
    .selectAll('line').data(links).enter().append('line')
    .attr('stroke', 'rgba(255,255,255,0.06)')
    .attr('stroke-width', d => Math.max(0.5, d.strength * 2.2));

  const circle = g.append('g')
    .selectAll('circle').data(nodes).enter().append('circle')
    .attr('r', r)
    .attr('fill', d => TYPE_COLOR[d.type] || '#737a99')
    .attr('fill-opacity', 0.82)
    .attr('stroke', d => TYPE_COLOR[d.type] || '#737a99')
    .attr('stroke-opacity', 0.28)
    .attr('stroke-width', 1.5)
    .style('cursor', 'grab')
    .call(
      d3.drag()
        .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on('drag',  (ev, d) => { d.fx=ev.x; d.fy=ev.y; })
        .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', (ev, d) => {
      const tt = document.getElementById('net-tt');
      document.getElementById('tt-name').textContent  = d.name;
      document.getElementById('tt-type').textContent  = TYPE_LABEL[d.type] || d.type;
      document.getElementById('tt-conns').textContent = d.deg + (d.deg===1?' connection':' connections');
      tt.style.display = 'block';
      positionTooltip(ev, tt);
    })
    .on('mousemove', (ev) => positionTooltip(ev, document.getElementById('net-tt')))
    .on('mouseout',  ()  => { document.getElementById('net-tt').style.display = 'none'; });

  // Labels for high-degree nodes only
  const label = g.append('g')
    .selectAll('text').data(nodes.filter(n => n.deg >= 3)).enter().append('text')
    .text(d => d.name.length > 22 ? d.name.slice(0,20) + '…' : d.name)
    .attr('font-size', 8.5)
    .attr('font-family', 'DM Sans, sans-serif')
    .attr('fill', '#8a91ad')
    .attr('text-anchor', 'middle')
    .attr('dy', d => r(d) + 11)
    .style('pointer-events', 'none')
    .style('user-select', 'none');

  sim.on('tick', () => {
    line
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    circle.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y);
  });
}

function positionTooltip(ev, tt) {
  // Use clientX/Y and the network wrap's bounding rect for reliable positioning
  const wrap = document.getElementById('network-wrap');
  const rect  = wrap.getBoundingClientRect();
  let x = ev.clientX - rect.left + 16;
  let y = ev.clientY - rect.top  - 10;
  // Clamp to stay inside the container
  x = Math.min(x, rect.width  - tt.offsetWidth  - 10);
  y = Math.max(y, 5);
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

// ─── City header ──────────────────────────────────────────────────────────────
function updateHeader(ov) {
  el('city-title').textContent = ov.city_name || '';
  el('city-region').textContent = ov.country_or_region || '';

  if (ov.data_as_of) {
    el('city-date').textContent = 'Updated ' + fmtDate(ov.data_as_of);
    el('city-sep').style.display = '';
  } else {
    el('city-date').textContent = '';
    el('city-sep').style.display = 'none';
  }

  const conf = ov.overall_confidence || '';
  const pill = el('city-conf');
  pill.textContent  = conf ? conf.charAt(0).toUpperCase() + conf.slice(1) + ' Confidence' : '';
  pill.className    = 'confidence-pill' + (conf ? ' ' + conf : '');
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function el(id)    { return document.getElementById(id); }
function fmt(n)    { return n == null ? '—' : Number(n).toLocaleString(); }
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
  catch { return iso; }
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function viewError(view, err) {
  el('v-' + view).innerHTML = `
    <div class="empty-view" style="color:var(--red)">
      ${esc(err.message)}
    </div>`;
  showOnly(view);
  console.error('[nexus]', err);
}

// ─── Event wiring ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  el('sidebar-nav').addEventListener('click', ev => {
    const item = ev.target.closest('.nav-item');
    if (item && S.city) loadView(item.dataset.view);
  });
  el('view-tabs').addEventListener('click', ev => {
    const tab = ev.target.closest('.view-tab');
    if (tab && S.city) loadView(tab.dataset.view);
  });
  init();
});
</script>
</body>
</html>
